<!DOCTYPE html>
<html>
  <head>
    <title>Map - Traveloop</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      
      #map {
        height: 100vh;
        width: 100vw;
        z-index: 1;
      }

      /* Dark mode map tiles filter trick */
      .leaflet-layer,
      .leaflet-control-zoom-in,
      .leaflet-control-zoom-out,
      .leaflet-control-attribution {
        filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
      }

      /* Fix popup style for dark theme */
      .leaflet-popup-content-wrapper {
        background: var(--bg-dark);
        color: white;
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
      .leaflet-popup-tip {
        background: var(--bg-dark);
        border: 1px solid var(--glass-border);
      }
      .leaflet-popup-content {
        text-align: center;
        font-family: 'Poppins', sans-serif;
      }
      .leaflet-popup-content b {
        font-size: 16px;
        color: var(--primary-cyan);
        display: block;
        margin-bottom: 10px;
      }
      .leaflet-popup-content button {
        background: linear-gradient(90deg, var(--primary-cyan), var(--primary-purple));
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        font-weight: 600;
        transition: transform 0.2s ease;
      }
      .leaflet-popup-content button:hover {
        transform: scale(1.05);
      }
      
      /* Make sure navbar is on top */
      .navbar {
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    
    <nav class="navbar animate-up">
        <div class="nav-logo">
            <a href="homepage.html">Traveloop</a>
        </div>
        <div class="nav-links">
            <a href="homepage.html" class="nav-item">Home</a>
            <a href="mapping3.html" class="nav-item" style="color: var(--primary-cyan);">Map</a>
            <a href="todolist.html" class="nav-item">To-Do list</a>
            <a href="pr.html" class="nav-item">Chat Bot</a>
            <a href="scrapbook.html" class="nav-item">Snaps</a>
        </div>
    </nav>
    
    <div id="map"></div>
    
    <script>
      function initMap() {
        const map = L.map('map', {
            zoomControl: false // Move zoom control to bottom right so it doesn't overlap navbar
        }).setView([23.2599, 77.4126], 5);

        L.control.zoom({
            position: 'bottomright'
        }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        const locations = [
          { lat: 22.5726, lng: 88.3639, title: "Kolkata", url: "kolkata.html" },
          { lat: 27.0360, lng: 88.2627, title: "Darjeeling", url: "darjeeling.html" },
          { lat: 30.0869, lng: 78.2676, title: "Rishikesh", url: "rishikesh.html" },
          { lat: 15.2993, lng: 74.1240, title: "Goa", url: "goa.html" },
          { lat: 12.9716, lng: 77.5946, title: "Bangalore", url: "bangalore.html" },
          { lat: 23.0225, lng: 72.5714, title: "Ahmedabad", url: "ahmedabad.html" },
          { lat: 28.7041, lng: 77.1025, title: "Delhi", url: "delhi.html" },
          { lat: 32.2396, lng: 77.1887, title: "Manali", url: "manali.html" },
          { lat: 34.2268, lng: 77.5619, title: "Ladakh", url: "ladakh.html" } 
        ];

        locations.forEach(location => {
          const marker = L.marker([location.lat, location.lng])
            .addTo(map)
            .bindPopup(`<b>${location.title}</b>
                <button onclick="window.location.href='${location.url}'">Visit Gallery</button>`);
        });
      }

      document.addEventListener("DOMContentLoaded", initMap);
    </script>
  </body>
</html>
